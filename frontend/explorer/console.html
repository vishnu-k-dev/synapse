<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SYNAPSE — Live Console</title>
  <link rel="stylesheet" href="console.css" />
</head>
<body>
  <header id="hdr">
    <span class="logo">SYNAPSE</span>
    <span class="tagline">Live Console — naive vs SYNAPSE, side by side</span>
    <span class="flow-pill"><b>Agent</b> ⇄ <b>MCP</b> ⇄ <b>API</b></span>
    <nav class="nav"><a href="index.html">◹ Capability Graph</a></nav>
  </header>

  <div id="tasks">
    <span class="lbl">Run a task</span>
    <div id="chiplist" style="display:flex;gap:10px;flex-wrap:wrap;"></div>
  </div>

  <div id="body">
    <div id="stage">
      <div class="stage-tag">SYNAPSE MCP fabric</div>
      <div id="cy"></div>
    </div>

    <div id="prompt"><span class="you">You</span><span class="ptext"></span></div>

    <div id="lanes">
      <section class="lane naive">
        <div class="lane-head">
          <span class="lane-title">Naive MCP</span>
          <span class="count-badge">— tools</span>
          <span class="lane-status"></span>
        </div>
        <div class="lane-body"></div>
      </section>
      <section class="lane synapse">
        <div class="lane-head">
          <span class="lane-title">SYNAPSE</span>
          <span class="count-badge">— tools</span>
          <span class="lane-status"></span>
        </div>
        <div class="lane-body"></div>
      </section>
    </div>

    <div id="verdict"></div>
  </div>

  <script src="vendor/cytoscape.min.js"></script>
  <script src="transcripts.js"></script>
  <script src="console.js"></script>
</body>
</html>
